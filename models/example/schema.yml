
version: 2

models:
  - name: my_first_dbt_model
    description: "A sample user table with BigQuery optimizations"
    columns:
      - name: id
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null
      - name: name
        description: "User's full name"
        data_tests:
          - not_null
      - name: email
        description: "User's email address"
        data_tests:
          - not_null
          - unique
      - name: created_at
        description: "Timestamp when the record was created"
        data_tests:
          - not_null
      - name: name_upper
        description: "Uppercase version of the name"
      - name: email_username
        description: "Username part of the email address"
      - name: created_year
        description: "Year when the record was created"

  - name: my_second_dbt_model
    description: "Aggregated user statistics by year"
    columns:
      - name: created_year
        description: "Year for the aggregation"
        data_tests:
          - not_null
      - name: total_users
        description: "Total number of users created in this year"
        data_tests:
          - not_null
      - name: unique_usernames
        description: "Number of unique usernames in this year"
      - name: first_created
        description: "Earliest creation timestamp in this year"
      - name: last_created
        description: "Latest creation timestamp in this year"
      - name: names_by_creation
        description: "Array of names ordered by creation time"
      - name: all_names
        description: "Comma-separated list of all names"
